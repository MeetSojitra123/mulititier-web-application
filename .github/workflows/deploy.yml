name: Production Multi-Tier Deployment

on:
  push:
    branches:
      - main  # Triggers the pipeline when you push to the main branch

jobs:
  # --- JOB 1: BUILD & DEPLOY FRONTEND ---
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install & Build Client
        run: |
          cd client
          npm install
          npm run build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1  # Mumbai region matching your S3 setup

      - name: Sync Static Assets to S3
        run: |
          aws s3 sync ./client/dist s3://multitier-frontend --delete

      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation --distribution-id E1GC1HVLKVJ56U --paths "/*"

  # --- JOB 2: UPDATE EC2 BACKEND ---
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH into EC2 & Restart Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Navigate to the cloned repository on your EC2
            cd ~/mulititier-web-application
            
            # Pull down the latest code changes securely
            git fetch --all
            git reset --hard origin/main
            
            # Install backend production dependencies
            cd server
            npm install --production
            
            # Cleanly restart the backend service using PM2
            pm2 restart all || pm2 start server.js --name "mern-backend"
